upstream app_server {
    server unix:/run/gunicorn.sock fail_timeout=0;
}

upstream websocket_server {
    server unix:/run/daphne.sock fail_timeout=0;
}

server {
    listen 80;
    server_name api.terangacivil.sn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.terangacivil.sn;

    client_max_body_size 12M;

    # SSL Config
    ssl_certificate /etc/letsencrypt/live/api.terangacivil.sn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.terangacivil.sn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location /static/ {
        alias /var/www/Teranga-Civil-1/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/Teranga-Civil-1/backend/media/;
        expires 30d;
        access_log off;
    }

    # WebSockets Routing
    location /ws/ {
        proxy_pass http://websocket_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    # REST API Routing
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;

        if (!-f $request_filename) {
            proxy_pass http://app_server;
            break;
        }
    }
}
