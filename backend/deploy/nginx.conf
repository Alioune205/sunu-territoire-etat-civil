server {
    listen 80;
    server_name api.terangacivil.sn;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.terangacivil.sn;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/api.terangacivil.sn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.terangacivil.sn/privkey.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Logging
    access_log /var/log/nginx/teranga_civil_access.log;
    error_log /var/log/nginx/teranga_civil_error.log;

    client_max_body_size 20M;

    # Static files
    location /static/ {
        alias /var/www/teranga_civil/static/;
        expires 30d;
        access_log off;
    }

    # Media files (uploaded documents, generated PDFs)
    location /media/ {
        alias /var/www/teranga_civil/media/;
        internal;
        expires 7d;
        access_log off;
    }

    # Django Channels (WebSockets)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # API & Admin (Gunicorn)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
